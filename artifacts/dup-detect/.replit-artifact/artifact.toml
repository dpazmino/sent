kind = "web"
previewPath = "/"
title = "Duplicate Payment Detector"
version = "1.0.0"
id = "artifacts/dup-detect"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
localPort = 22951
name = "web"
paths = ["/"]

[services.development]
run = "pnpm --filter @workspace/dup-detect run dev"

[services.env]
PORT = "22951"
BASE_PATH = "/"

[services.production]
build = ["pnpm", "--filter", "@workspace/dup-detect", "run", "build"]
publicDir = "artifacts/dup-detect/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"
